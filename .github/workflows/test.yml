name: Test

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  phpunit:
    name: php unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
        composer:
          - ""
          - "--prefer-lowest"
          - "--prefer-stable"
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install Dependencies
        run: composer update --no-interaction --no-progress ${{ matrix.composer }}
      - name: Run tests
        run: composer test
